name: Validate Discord Data

on:
  pull_request:
    paths:
      - 'data/sources/discord/**'
      - 'data/pipelines/discord/**'
      - 'data/types/src/discord*.ts'
  push:
    branches: [main]
    paths:
      - 'data/sources/discord/**'
      - 'data/pipelines/discord/**'
      - 'data/types/src/discord*.ts'

permissions:
  contents: read

jobs:
  validate-discord-data:
    name: Validate Discord Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: data
        run: pnpm install --frozen-lockfile

      - name: Validate Discord Data
        working-directory: data
        run: |
          echo "🔍 Validating Discord data..."
          pnpm run validate:discord

      - name: Check Discord Invites
        if: github.event_name == 'pull_request'
        working-directory: data
        run: |
          echo "🔗 Checking Discord invite links..."
          pnpm run validate:discord:check-invites || true

      - name: Summary
        run: |
          raw_count=$(find data/sources/discord -name "*.json" 2>/dev/null | wc -l || echo "0")
          echo "✅ Discord data validation complete"
          echo "   Source files: $raw_count"
